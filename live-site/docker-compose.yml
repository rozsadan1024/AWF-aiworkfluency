version: '3.8'

services:
  aiproof:
    build: .
    container_name: aiproof-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3100:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
